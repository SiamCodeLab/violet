# flutter pub run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/images/branding/logo_r.png"
  android: "launcher_icon"
  min_sdk_android: 21
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/branding/logo_r.png" 
  ios: true
  remove_alpha_ios: true



  windows:
    generate: true
    image_path: "assets/images/branding/logo_r.png"
    icon_size: 48 # min:48, max:256, default: 48

  macos:
    generate: true
    image_path: "assets/images/branding/logo.png"
