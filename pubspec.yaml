name: violet
description: "Violet — AI Support Platform"
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
# publish_to: 'none'
version: 1.0.0+7

environment:
  sdk: ^3.10.1
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Window management
  window_size: ^0.1.0

  # State management
  get: ^4.7.3

  # file picker
  image_picker: ^1.2.1
  file_picker: ^10.3.7

  # Local Storage
  shared_preferences: ^2.5.4
  http: ^1.6.0

  # Messages Format
  flutter_markdown_plus: ^1.0.7
  markdown: ^7.3.1

  # Url Launcher
  url_launcher: ^6.3.2

  # Clipboard - Only For Windows and MacOS If you build a Android or iOS App then comment this super_clipboard plugin
  # super_clipboard: ^0.9.1

  #flutter websocket channel
  web_socket_channel: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/branding/logo.png" # your icon image path

launcher_name:
  default: "Violet"

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/branding/
    - assets/icons/
    - assets/icons/future_icon/
    - assets/icons/loading_icon/
