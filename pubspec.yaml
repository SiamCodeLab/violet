name: violet
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none'
version: 1.0.0+3

msix_config:
  display_name: Violet
  publisher_display_name: Your Name
  identity_name: com.violet.app
  msix_version: 1.0.0.0
  logo_path: assets/images/branding/logo.png


environment:
  sdk: ^3.10.1
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  window_size: ^0.1.0

  # State management
  get: ^4.7.3

  # file picker
  image_picker: ^1.2.1
  file_picker: ^10.3.7

  # Local Storage
  shared_preferences: ^2.5.4
  http: ^1.6.0

  # Messages Format
  flutter_markdown_plus: ^1.0.7
  url_launcher: ^6.3.2
  launcher_name: ^1.0.2


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  msix: ^3.16.6


  flutter_launcher_icons: ^0.14.4
  change_app_package_name: ^1.4.0

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/branding/logo.png" # your icon image path

launcher_name:
  default: "Violet"


# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true
  assets:
      - assets/images/
      - assets/images/branding/
      - assets/icons/
      - assets/icons/future_icon/
      - assets/icons/loading_icon/

